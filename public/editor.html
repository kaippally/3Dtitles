<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>3D Title Editor</title>
  <link rel="stylesheet" href="/editor.css?v=2">
</head>
<body>

<header>
  <span class="brand">🎬 3D Title Editor</span>
  <span class="filename" id="fname">untitled</span>
  <button class="hbtn" id="btnOpen">Open</button>
  <button class="hbtn" id="btnSave">Save</button>
  <button class="hbtn" id="btnSaveAs">Save As&hellip;</button>
  <button class="hbtn" id="btnFonts">&#8635; Fonts</button>
  <a class="hbtn" href="/display" target="_blank">&#9099; Display</a>
</header>

<div class="main">
  <div class="tracks-panel">
    <!-- Global Card -->
    <div class="global-card">
      <div class="global-card-title">📺 Global Scene Settings</div>
      <div class="row">
        <label>Aspect Ratio</label>
        <select id="selAspectRatio"></select>
      </div>
    </div>
    
    <div id="tracksPanel" style="display:flex; flex-direction:column; gap:10px;"></div>
  </div>

  <div class="preview-panel">
    <div class="preview-title">Live Preview</div>
    <div class="preview-container">
      <canvas id="previewCanvas"></canvas>
    </div>
    <div class="preview-controls">
      <button class="hbtn primary" id="btnTrigger">&#9654; Trigger</button>
      <button class="hbtn danger"  id="btnReset">&#9632; Reset</button>
      <button class="hbtn"         id="btnPauseSpin">&#10074;&#10074; Pause Spin</button>
    </div>
  </div>
</div>

<footer>
  <span class="hint">Changes auto-apply to display</span>
  <div class="spacer"></div>
  <button class="hbtn primary" id="btnTrigger2">&#9654; Trigger All</button>
  <button class="hbtn danger"  id="btnReset2">&#9632; Reset</button>
</footer>

<!-- Open modal -->
<div class="overlay hidden" id="openModal">
  <div class="modal">
    <h3>Open Scene</h3>
    <ul class="mlist" id="savesList"></ul>
    <div class="mbtns">
      <button class="hbtn" id="btnCloseOpen">Cancel</button>
    </div>
  </div>
</div>

<!-- Save As modal -->
<div class="overlay hidden" id="saveAsModal">
  <div class="modal">
    <h3>Save As</h3>
    <input type="text" id="saveAsName" placeholder="Scene name..." />
    <div class="mbtns">
      <button class="hbtn" id="btnCloseSaveAs">Cancel</button>
      <button class="hbtn primary" id="btnDoSaveAs">Save</button>
    </div>
  </div>
</div>

<!-- Select Audio modal -->
<div class="overlay hidden" id="audioModal">
  <div class="modal" style="max-width: 500px;">
    <h3>Select Audio File</h3>
    <div style="margin-bottom: 12px; display: flex; gap: 8px;">
      <button class="hbtn primary" id="btnUploadAudio">Upload Audio File</button>
      <input type="file" id="audioFileInput" accept="audio/*" style="display: none;" />
    </div>
    <ul class="mlist" id="audioList" style="max-height: 250px;"></ul>
    <div class="mbtns">
      <button class="hbtn danger" id="btnClearAudio">Clear Audio</button>
      <button class="hbtn" id="btnCloseAudio">Cancel</button>
    </div>
  </div>
</div>

<!-- Three.js served locally — no internet required -->
<script src="/vendor/three.min.js"></script>
<script src="/vendor/FontLoader.js"></script>
<script src="/vendor/TextGeometry.js"></script>
<script src="/utils.js?v=2"></script>
<script src="/editor.js?v=2"></script>
</body>
</html>

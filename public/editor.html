<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>3D Title Editor</title>
  <link rel="stylesheet" href="/editor.css?v=4">
</head>
<body>

<header>
  <span class="brand">🎬 3D Title Editor</span>
  <span class="filename" id="fname">untitled</span>
  <button class="hbtn" id="btnSave">Save</button>
  <button class="hbtn" id="btnSaveAs">Save As&hellip;</button>
  <button class="hbtn" id="btnFonts">&#8635; Fonts</button>
  <button class="hbtn primary" id="btnTrigger">&#9654; Trigger</button>
  <button class="hbtn danger"  id="btnReset">&#9632; Reset</button>
  <button class="hbtn"         id="btnResetView">Reset View</button>
  <button class="hbtn primary" id="btnTrigger2">&#9654; Trigger All</button>
  <button class="hbtn danger"  id="btnReset2">&#9632; Reset</button>
  <a class="hbtn" href="/display" target="_blank">&#9099; Display</a>
</header>

<div class="main">
  <div class="templates-panel" id="templatesPanel">
    <div class="templates-title">Saved Templates</div>
    <div class="templates-search-container">
      <input type="text" id="templatesSearch" placeholder="Search templates..." />
    </div>
    <ul class="templates-list" id="templatesList"></ul>
  </div>
  <div class="resizer" id="resizer1"></div>

  <div class="tracks-panel">
    <!-- Global Card -->
    <div class="global-card">
      <div class="global-card-title">📺 Global Scene Settings</div>
      <div class="row">
        <label>Aspect Ratio</label>
        <select id="selAspectRatio"></select>
      </div>
    </div>

    <div class="track-add-controls">
      <button class="hbtn primary" id="btnAddText">+ Add Text</button>
      <button class="hbtn primary" id="btnAddPicture">+ Add Picture</button>
    </div>
    
    <div id="tracksPanel" style="display:flex; flex-direction:column; gap:10px;"></div>
  </div>
  <div class="resizer" id="resizer2"></div>

  <div class="preview-panel">
    <div class="preview-title">
      <span>Live Preview</span>
      <div class="grid-controls">
        <label>
          <input type="checkbox" id="chkShowGrid">
          Grid
        </label>
        <select id="selGridSize" style="display: none;">
          <option value="10">10x10</option>
          <option value="50" selected>50x50</option>
          <option value="100">100x100</option>
        </select>
      </div>
    </div>
    <div class="preview-container">
      <canvas id="previewCanvas"></canvas>
    </div>
  </div>
</div>

<footer>
  <span class="hint" style="display: flex; align-items: center; gap: 6px;">
    <input type="checkbox" id="chkAutoTrigger" checked style="cursor: pointer; accent-color: var(--accent);">
    <label for="chkAutoTrigger" style="cursor: pointer; user-select: none;">Auto-trigger overlay on edit</label>
  </span>
  <div class="spacer"></div>
</footer>



<!-- Save As modal -->
<div class="overlay hidden" id="saveAsModal">
  <div class="modal">
    <h3>Save As</h3>
    <input type="text" id="saveAsName" placeholder="Scene name..." />
    <div class="mbtns">
      <button class="hbtn" id="btnCloseSaveAs">Cancel</button>
      <button class="hbtn primary" id="btnDoSaveAs">Save</button>
    </div>
  </div>
</div>

<!-- Select Audio modal -->
<div class="overlay hidden" id="audioModal">
  <div class="modal" style="max-width: 500px;">
    <h3>Select Audio File</h3>
    <div style="margin-bottom: 12px; display: flex; gap: 8px;">
      <button class="hbtn primary" id="btnUploadAudio">Upload Audio File</button>
      <input type="file" id="audioFileInput" accept="audio/*" style="display: none;" />
    </div>
    <ul class="mlist" id="audioList" style="max-height: 250px;"></ul>
    <div class="mbtns">
      <button class="hbtn danger" id="btnClearAudio">Clear Audio</button>
      <button class="hbtn" id="btnCloseAudio">Cancel</button>
    </div>
  </div>
</div>

<!-- Select Image modal -->
<div class="overlay hidden" id="imageModal">
  <div class="modal" style="max-width: 500px;">
    <h3>Select Image File (PNG)</h3>
    <div style="margin-bottom: 12px; display: flex; gap: 8px;">
      <button class="hbtn primary" id="btnUploadImage">Upload Image</button>
      <input type="file" id="imageFileInput" accept="image/png" style="display: none;" />
    </div>
    <ul class="mlist" id="imageList" style="max-height: 250px;"></ul>
    <div class="mbtns">
      <button class="hbtn danger" id="btnClearImage">Clear Image</button>
      <button class="hbtn" id="btnCloseImage">Cancel</button>
    </div>
  </div>
</div>

<!-- Three.js served locally — no internet required -->
<script src="/vendor/three.min.js"></script>
<script src="/vendor/FontLoader.js"></script>
<script src="/vendor/TextGeometry.js"></script>
<script src="/utils.js?v=4"></script>
<script src="/editor.js?v=4"></script>
</body>
</html>

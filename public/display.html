<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Title Display</title>
  <style>
    html, body {
      background-color: rgba(0, 0, 0, 0); /* transparent */
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    canvas {
      width: 100vw;
      height: 100vh;
      display: block;
    }
  </style>
</head>
<body>

<canvas id="displayCanvas"></canvas>

<!-- Load Three.js and modules -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/loaders/FontLoader.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/geometries/TextGeometry.js"></script>
<script src="/display.js"></script>
</body>
</html>
